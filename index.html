<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BP Tracker">
  <title>BP Tracker</title>
  
  <link rel="apple-touch-icon" href="https://fav.farm/🫀">
  <link rel="icon" href="https://fav.farm/🫀">

  <!-- Chart.js for trends -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --sys-color: #f43f5e;
      --dia-color: #3b82f6;
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      padding: 1rem;
      padding-top: calc(1rem + env(safe-area-inset-top));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
      max-width: 500px;
      margin: 0 auto;
    }

    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem; text-align: center; }

    /* Navigation Tabs */
    .tab-nav {
      display: flex;
      background: var(--card-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 0.6rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #0f172a;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .form-group { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; }
    label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 1.1rem;
      width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .input-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; }

    button.btn-primary {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 0.85rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 0.5rem;
      border-radius: 8px;
    }

    /* History & Stats Styles */
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .log-item:last-child { border-bottom: none; }
    .readings { font-size: 1.1rem; font-weight: 600; }
    .pulse { font-size: 0.85rem; color: var(--text-dim); }
    .date { font-size: 0.75rem; color: var(--text-dim); }
    
    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 0.2rem;
      display: inline-block;
    }
    .bg-normal { background: #166534; color: #4ade80; }
    .bg-elevated { background: #854d0e; color: #fef08a; }
    .bg-stage1 { background: #9a3412; color: #ffedd5; }
    .bg-stage2 { background: #991b1b; color: #fecaca; }

    /* Summary Grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
    .stat-card {
      background: var(--bg);
      padding: 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .stat-val { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-top: 0.2rem; }
    .stat-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.1rem; }

    .actions-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
  </style>
</head>
<body>

  <h1>Blood Pressure</h1>

  <!-- Navigation Tabs -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('log-tab')">Log & List</button>
    <button class="tab-btn" onclick="switchTab('charts-tab')">Graph</button>
    <button class="tab-btn" onclick="switchTab('stats-tab')">Averages</button>
  </div>

  <!-- TAB 1: Log & History -->
  <div id="log-tab" class="tab-content active">
    <div class="card">
      <form id="bp-form">
        <div class="input-row">
          <div class="form-group">
            <label for="sys">SYS</label>
            <input type="number" id="sys" placeholder="120" required min="50" max="250" inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="dia">DIA</label>
            <input type="number" id="dia" placeholder="80" required min="30" max="150" inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="pulse">Pulse</label>
            <input type="number" id="pulse" placeholder="70" inputmode="numeric">
          </div>
        </div>
        <button type="submit" class="btn-primary">Save Reading</button>
      </form>
    </div>

    <div class="card">
      <div class="history-header">
        <h2>History</h2>
        <span id="count" style="font-size: 0.85rem; color: var(--text-dim);">0 logs</span>
      </div>
      <div id="log-list"></div>
    </div>

    <div class="actions-row">
      <button class="btn-secondary" style="flex:1" onclick="exportCSV()">Export CSV</button>
      <button class="btn-secondary" style="flex:1" onclick="clearData()">Clear All</button>
    </div>
  </div>

  <!-- TAB 2: Trend Graph -->
  <div id="charts-tab" class="tab-content">
    <div class="card">
      <h2 style="font-size: 1rem; margin-bottom: 1rem; color: var(--text-dim);">Recent Trends (Last 20)</h2>
      <canvas id="bpChart" width="400" height="280"></canvas>
    </div>
  </div>

  <!-- TAB 3: Averages -->
  <div id="stats-tab" class="tab-content">
    <div class="card">
      <h2 style="font-size: 1rem; color: var(--text-dim);">7-Day Average</h2>
      <div class="stat-grid" id="week-stats"></div>
    </div>
    <div class="card">
      <h2 style="font-size: 1rem; color: var(--text-dim);">30-Day Average</h2>
      <div class="stat-grid" id="month-stats"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bp_readings_data';
    let chartInstance = null;

    // Helper: Categorize BP
    function getCategory(sys, dia) {
      if (sys < 120 && dia < 80) return { label: 'Normal', class: 'bg-normal' };
      if (sys <= 129 && dia < 80) return { label: 'Elevated', class: 'bg-elevated' };
      if (sys <= 139 || dia <= 89) return { label: 'Stage 1', class: 'bg-stage1' };
      return { label: 'Stage 2', class: 'bg-stage2' };
    }

    function getLogs() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    // Tab Navigation
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tabId).classList.add('active');

      if (tabId === 'charts-tab') renderChart();
      if (tabId === 'stats-tab') renderAverages();
    }

    // Render Log List
    function renderLogs() {
      const logs = getLogs();
      const listEl = document.getElementById('log-list');
      document.getElementById('count').textContent = `${logs.length} logs`;

      if (logs.length === 0) {
        listEl.innerHTML = '<p style="color: var(--text-dim); text-align: center; padding: 1rem 0;">No readings logged yet.</p>';
        return;
      }

      listEl.innerHTML = logs.map((item, index) => {
        const cat = getCategory(item.sys, item.dia);
        const dateStr = new Date(item.timestamp).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
        
        return `
          <div class="log-item">
            <div>
              <div class="readings">${item.sys} / ${item.dia} <span class="pulse">${item.pulse ? '❤️ ' + item.pulse : ''}</span></div>
              <span class="badge ${cat.class}">${cat.label}</span>
            </div>
            <div style="text-align: right;">
              <div class="date">${dateStr}</div>
              <button class="btn-secondary" style="padding: 0.2rem 0.4rem; margin-top: 0.2rem;" onclick="deleteLog(${index})">✕</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Form Submit
    document.getElementById('bp-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const sys = parseInt(document.getElementById('sys').value);
      const dia = parseInt(document.getElementById('dia').value);
      const pulse = document.getElementById('pulse').value ? parseInt(document.getElementById('pulse').value) : null;

      const newLog = { sys, dia, pulse, timestamp: new Date().toISOString() };
      const logs = getLogs();
      logs.unshift(newLog);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));

      document.getElementById('bp-form').reset();
      renderLogs();
    });

    function deleteLog(index) {
      const logs = getLogs();
      logs.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
      renderLogs();
    }

    function clearData() {
      if (confirm('Delete all stored blood pressure records?')) {
        localStorage.removeItem(STORAGE_KEY);
        renderLogs();
      }
    }

    function exportCSV() {
      const logs = getLogs();
      if (logs.length === 0) return alert('No data to export.');
      let csv = 'Timestamp,Systolic,Diastolic,Pulse\n';
      logs.forEach(l => { csv += `"${l.timestamp}",${l.sys},${l.dia},${l.pulse || ''}\n`; });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bp_log_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    // Render Trend Chart
    function renderChart() {
      const logs = getLogs().slice(0, 20).reverse(); // Chronological (up to 20)
      const ctx = document.getElementById('bpChart').getContext('2d');

      if (chartInstance) chartInstance.destroy();

      if (logs.length === 0) return;

      const labels = logs.map(l => new Date(l.timestamp).toLocaleDateString([], { month: 'numeric', day: 'numeric' }));
      const sysData = logs.map(l => l.sys);
      const diaData = logs.map(l => l.dia);

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Systolic', data: sysData, borderColor: '#f43f5e', backgroundColor: '#f43f5e', tension: 0.3 },
            { label: 'Diastolic', data: diaData, borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.3 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#94a3b8' } } },
          scales: {
            x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
            y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
          }
        }
      });
    }

    // Calculate & Render Averages
    function renderAverages() {
      const logs = getLogs();
      const now = new Date();

      const calcAvg = (days) => {
        const cutoff = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
        const filtered = logs.filter(l => new Date(l.timestamp) >= cutoff);
        
        if (filtered.length === 0) return null;

        const sumSys = filtered.reduce((acc, l) => acc + l.sys, 0);
        const sumDia = filtered.reduce((acc, l) => acc + l.dia, 0);
        const sumPulse = filtered.filter(l => l.pulse).reduce((acc, l) => acc + l.pulse, 0);
        const pulseCount = filtered.filter(l => l.pulse).length;

        return {
          sys: Math.round(sumSys / filtered.length),
          dia: Math.round(sumDia / filtered.length),
          pulse: pulseCount ? Math.round(sumPulse / pulseCount) : '--',
          count: filtered.length
        };
      };

      const renderGrid = (elementId, stats) => {
        const el = document.getElementById(elementId);
        if (!stats) {
          el.innerHTML = '<p style="color: var(--text-dim); grid-column: span 2; padding: 0.5rem 0;">No readings in this period.</p>';
          return;
        }
        const cat = getCategory(stats.sys, stats.dia);
        el.innerHTML = `
          <div class="stat-card">
            <div class="stat-sub">AVG BP</div>
            <div class="stat-val">${stats.sys}/${stats.dia}</div>
            <span class="badge ${cat.class}">${cat.label}</span>
          </div>
          <div class="stat-card">
            <div class="stat-sub">AVG PULSE</div>
            <div class="stat-val">${stats.pulse} <span style="font-size:0.8rem">BPM</span></div>
            <div class="stat-sub" style="margin-top:0.4rem">${stats.count} reading(s)</div>
          </div>
        `;
      };

      renderGrid('week-stats', calcAvg(7));
      renderGrid('month-stats', calcAvg(30));
    }

    // Initial Load
    renderLogs();
  </script>
</body>
</html>
